<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Product Review Form - Felix Barreto</title>
    <meta name="description" content="Website Planning Document - Venezuela Land of Grace">
    <meta name="author" content="Felix Jose Barreto Zerpa">

    <link rel="stylesheet" href="styles/form/form.css">
    <link rel="stylesheet" href="styles/form/form-large.css">

    <script src="scripts/form/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html" class="wf1">
            <label for="product-name">Product Name</label>
            <select name="product-name" id="product-name" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <div class="field-label">
                Overall Rating
            </div>
            <div class="stars">
                <label for="rating1" class="star-option"></label>
                <span class="star-display">&#x2606;</span>
                <input type="radio" id="rating1" name="rating" value="1" required>

                <label for="rating2" class="star-option"></label>
                <span class="star-display">&#x2606;&#x2606;</span>
                <input type="radio" id="rating2" name="rating" value="2" required>

                <label for="rating3" class="star-option"></label>
                <span class="star-display">&#x2606;&#x2606;&#x2606;</span>
                <input type="radio" id="rating3" name="rating" value="3" required>

                <label for="rating4" class="star-option"></label>
                <span class="star-display">&#x2606;&#x2606;&#x2606;&#x2606;</span>
                <input type="radio" id="rating4" name="rating" value="4" required>

                <label for="rating5" class="star-option"></label>
                <span class="star-display">&#x2606;&#x2606;&#x2606;&#x2606;&#x2606;</span>
                <input type="radio" id="rating5" name="rating" value="5" required>
            </div>

            <label for="date" class="spaced">Date of Installation</label>
            <input type="date" name="date" id="date" required>

            <div>Useful Features</div>
            <label for="desing">Desing</label>
            <input type="checkbox" name="desing" id="desing" value="desing">

            <label for="durability">Durability</label>
            <input type="checkbox" name="durability" id="durability" value="durability">

            <label for="easy">Easy of Use</label>
            <input type="checkbox" name="easy" id="easy" value="easy">

            <label for="perfomance">Perfomance</label>
            <input type="checkbox" name="perfomance" id="perfomance" value="perfomance">

            <label for="review" class="spaced">Written Review <span>(Optional)</span></label>
            <textarea id="review" name="review" rows="4" cols="50"></textarea>

            <label for="name" class="spaced">Your Name <span>(Optional)</span></label>
            <input type="text" name="name" id="name">

            <input type="submit" value="Post Review">
        </form>
    </main>

    <footer>
        <p>&copy;<span id="currentyear"></span> 🏷️ Félix José Barreto Zerpa 🏷️ Venezuela</p>
        <p><span id="lastModified"></span></p>
    </footer>
</body>

</html>
